<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="./">
  <title>XeNTaX Backup</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 960px;
      margin: 0 auto;
      padding: 20px;
      color: #24292e;
      line-height: 1.6;
    }
    a { color: #0366d6; }
    pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
    }
    code {
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 85%;
      background: #f6f8fa;
      padding: 2px 4px;
      border-radius: 3px;
    }
    pre code { background: none; padding: 0; }
    #nav {
      padding: 10px 0;
      margin-bottom: 20px;
      border-bottom: 1px solid #e1e4e8;
    }
    #content { min-height: 200px; }
    #loading { color: #586069; }
  </style>
</head>
<body>
  <div id="nav">
    <a href="./">&#8962; Home (Post Index)</a>
  </div>
  <div id="content"><span id="loading">Loading...</span></div>

  <script>
    // Derive BASE from the actual URL of this page before any history manipulation.
    // e.g. at /BUXeNTaXBackup.github.io/ → BASE = '/BUXeNTaXBackup.github.io'
    // At root / → BASE = ''
    var BASE = window.location.pathname.replace(/\/(?:index\.html)?$/, '');

    // Domain whose links should be rewritten to stay within this deployment
    var XENTAX_ORIGIN = 'xentaxbackup.github.io';

    // Handle SPA redirect from 404.html
    var redirectPath = sessionStorage.getItem('redirect');
    if (redirectPath) {
      sessionStorage.removeItem('redirect');
      window.history.replaceState(null, null, redirectPath);
    }

    function loadPage() {
      var path = window.location.pathname;
      // Strip the base path prefix
      if (BASE && (path === BASE || path.indexOf(BASE + '/') === 0)) {
        path = path.slice(BASE.length);
      }
      // Remove leading slash and trailing slash
      path = path.replace(/^\//, '').replace(/\/$/, '');

      var mdPath;
      if (!path || path === 'index.html') {
        mdPath = 'PostIndex.md';
      } else {
        mdPath = path;
        // If no real file extension (alphanumeric only, e.g. .md .zip .html),
        // assume markdown. This avoids false matches on filenames like
        // "foo .dig image file formats_123" where ".dig ..." is not an extension.
        if (!/\.[a-zA-Z0-9]+$/.test(path)) {
          mdPath = path + '.md';
        }
      }

      fetch(mdPath)
        .then(function(r) {
          if (!r.ok) throw new Error('Not found');
          return r.text();
        })
        .then(function(text) {
          document.getElementById('content').innerHTML = DOMPurify.sanitize(marked.parse(text));
          // Set title from first heading or filename
          var h1 = document.querySelector('#content h1, #content h2');
          if (h1) {
            document.title = h1.textContent + ' - XeNTaX Backup';
          } else {
            var name = mdPath.replace(/^markdown\//, '').replace(/\.md$/, '');
            document.title = name + ' - XeNTaX Backup';
          }
          // Rewrite absolute XeNTaXBackup.github.io links to relative SPA navigation
          var xentaxRe = new RegExp('^https?://' + XENTAX_ORIGIN + '(\/.*)?$', 'i');
          document.querySelectorAll('#content a[href]').forEach(function(a) {
            var href = a.getAttribute('href');
            var match = href.match(xentaxRe);
            if (match) {
              var relPath = match[1] || '/';
              a.setAttribute('href', BASE + relPath);
            }
          });
        })
        .catch(function() {
          document.getElementById('content').innerHTML =
            '<h1>Page Not Found</h1><p><a href="./">Back to index</a></p>';
          document.title = 'Not Found - XeNTaX Backup';
        });
    }

    // SPA link handler: intercept same-origin clicks and navigate without full reload
    document.getElementById('content').addEventListener('click', function(e) {
      var a = e.target.closest('a[href]');
      if (!a) return;
      var href = a.getAttribute('href');
      // Only handle absolute paths starting with BASE (already rewritten from xentax links)
      if (href && href.charAt(0) === '/') {
        e.preventDefault();
        window.history.pushState(null, null, href);
        loadPage();
      }
    });

    window.addEventListener('popstate', loadPage);
    loadPage();
  </script>
</body>
</html>
